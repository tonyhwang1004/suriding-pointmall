<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>수리딩 포인트몰</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pr:#FF6B35;--prl:#FFE8DF;--sec:#FFD166;--acc:#06D6A0;--accd:#048A65;--bg:#FFF8F0;--tx:#2D2D2D;--txm:#888;--bd:#F0E8E0;--dng:#EF476F}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);min-height:100vh}
.hd{background:var(--pr);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(255,107,53,.3)}
.hd-logo{font-family:"Black Han Sans",sans-serif;font-size:19px}.hd-logo span{color:var(--sec)}
.hd-tabs{display:flex;gap:5px}
.tb{background:rgba(255,255,255,.18);border:none;color:#fff;padding:6px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-family:"Noto Sans KR",sans-serif;transition:background .2s;white-space:nowrap}
.tb:hover{background:rgba(255,255,255,.32)}.tb.on{background:#fff;color:var(--pr);font-weight:700}
.main{padding:14px;max-width:500px;margin:0 auto;width:100%}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 16px;gap:12px}
.lc{background:#fff;border-radius:20px;padding:26px 22px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1.5px solid var(--bd)}
.lc-t{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.lc-s{font-size:13px;color:var(--txm);text-align:center;margin-bottom:18px}
.cg{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{background:#fff;border:1.5px solid var(--bd);border-radius:30px;padding:9px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--tx);transition:all .15s;font-family:"Noto Sans KR",sans-serif}
.chip:hover{border-color:var(--pr);color:var(--pr);background:var(--prl)}
.banner{background:#fff;border-radius:14px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;border:1.5px solid var(--bd);margin-bottom:13px}
.bn{font-size:15px;font-weight:700}.bns{font-size:11px;color:var(--txm);margin-top:2px}
.pb{background:var(--pr);color:#fff;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
.pb .star{color:var(--sec);font-size:14px}
.st{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--pr);flex-shrink:0}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
.sc{background:#fff;border-radius:12px;border:1.5px solid var(--bd);padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .15s;position:relative}
.sc:hover{border-color:var(--pr);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,107,53,.15)}
.sc.oos{opacity:.5;cursor:not-allowed}.sc.oos:hover{transform:none;box-shadow:none;border-color:var(--bd)}
.si{width:76px;height:76px;border-radius:8px;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si img{width:100%;height:100%;object-fit:cover}
.sn{font-size:12px;font-weight:700;text-align:center;color:var(--tx);line-height:1.2}
.sp{background:var(--prl);color:var(--pr);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700}
.ss{font-size:10px;color:var(--txm)}
.ob{position:absolute;top:6px;right:6px;background:var(--dng);color:#fff;border-radius:6px;padding:2px 5px;font-size:9px;font-weight:700}
.cb{background:#fff;border-radius:13px;padding:13px;border:1.5px solid var(--bd);margin-bottom:13px}
.ci{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.ci:last-child{border-bottom:none}.ci-n{font-weight:500}.ci-p{color:var(--pr);font-weight:700;font-size:11px}
.cr{background:none;border:none;color:var(--dng);cursor:pointer;font-size:14px;padding:0 3px}
.ct{margin-top:9px;padding-top:8px;border-top:2px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.ct-l{font-weight:700;font-size:13px}.ct-p{font-size:18px;font-weight:700;color:var(--pr)}
.ce{color:var(--txm);font-size:12px;text-align:center;padding:12px 0}
.bo{width:100%;background:var(--acc);color:#fff;border:none;border-radius:11px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:"Noto Sans KR",sans-serif;transition:opacity .2s;margin-bottom:14px}
.bo:hover{opacity:.9}.bo:disabled{background:#ccc;cursor:not-allowed}
.lr{text-align:center;margin-bottom:16px}
.lb{background:var(--bd);color:var(--txm);border:none;border-radius:20px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:"Noto Sans KR",sans-serif}
.ad{background:#fff;border-radius:11px;padding:11px 13px;border:1.5px solid var(--bd);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}
.ad-v{font-size:14px;font-weight:700}.aps{display:flex;align-items:center;gap:6px}.apl{font-size:12px;color:var(--txm)}
.api{border:1.5px solid var(--bd);border-radius:7px;padding:5px 8px;font-size:13px;font-weight:700;width:62px;outline:none;font-family:"Noto Sans KR",sans-serif;color:var(--tx)}
.api:focus{border-color:var(--pr)}
.as{background:var(--prl);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--pr);font-weight:700;margin-bottom:11px;display:flex;justify-content:space-between}
.al{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.ai{background:#fff;border-radius:11px;padding:11px 13px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ai.ck{border-color:var(--acc);background:#F0FDF8}
.an{font-size:13px;font-weight:500}.ae{font-size:11px;color:var(--accd);font-weight:700}
.acb{width:34px;height:34px;border-radius:50%;border:2px solid var(--bd);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.acb.on{background:var(--acc);border-color:var(--acc);color:#fff}
.bas{width:100%;background:var(--pr);color:#fff;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Noto Sans KR",sans-serif;transition:opacity .2s;margin-bottom:8px}
.bas:hover{opacity:.9}
.adc{background:#fff;border-radius:13px;padding:15px;border:1.5px solid var(--bd);margin-bottom:11px}
.adsb{font-size:11px;color:var(--txm);margin-bottom:12px}
.adr{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.adi{flex:1;border:1.5px solid var(--bd);border-radius:7px;padding:6px 9px;font-size:12px;outline:none;font-family:"Noto Sans KR",sans-serif;color:var(--tx)}
.adi:focus{border-color:var(--pr)}
.bs{background:var(--pr);color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:"Noto Sans KR",sans-serif;white-space:nowrap}
.bs.gr{background:var(--txm)}.bs.gn{background:var(--accd)}.bs.bl{background:#378ADD}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{color:var(--txm);font-weight:500;padding:4px 3px;border-bottom:1.5px solid var(--bd);text-align:left}
.tbl td{padding:6px 3px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.oi{padding:8px 0;border-bottom:1px solid var(--bd);font-size:11px}.oi:last-child{border-bottom:none}
.on_{font-weight:700;font-size:12px}.om{color:var(--txm);font-size:10px;margin-top:2px}
.os{display:inline-block;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;border:none;font-family:"Noto Sans KR",sans-serif}
.sp_{background:#FFF3CD;color:#8B6914}.sd{background:#D4EDDA;color:#1A6B33}
.ali{padding:6px 0;border-bottom:1px solid var(--bd);font-size:11px;color:var(--tx)}.ali:last-child{border-bottom:none}
.sync-row{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-bottom:10px;font-size:11px;color:var(--txm)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.sync-dot.ok{background:var(--acc)}.sync-dot.err{background:var(--dng)}.sync-dot.spin{background:var(--sec);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading-wrap{display:flex;flex-direction:column;align-items:center;padding:40px;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:#FEE;border:1.5px solid var(--dng);border-radius:12px;padding:14px;margin:12px;font-size:12px;color:#9B2020;line-height:1.8;text-align:center}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2D2D2D;color:#fff;border-radius:20px;padding:8px 20px;font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-family:"Noto Sans KR",sans-serif}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="hd">
    <div class="hd-logo">수리딩 <span>포인트몰</span></div>
    <div class="hd-tabs">
      <button class="tb on" id="tb-s" onclick="setMode('s')">학생</button>
      <button class="tb" id="tb-a" onclick="setMode('a')">출석</button>
      <button class="tb" id="tb-m" onclick="setMode('m')">관리자</button>
    </div>
  </div>

  <div id="pg-login" class="login-wrap">
    <div style="font-size:42px;margin-bottom:-4px">🍭</div>
    <div class="lc">
      <div class="lc-t">반갑습니다!</div>
      <div class="lc-s">이름을 눌러서 포인트몰 입장</div>
      <div class="cg" id="chipGrid">
        <div class="loading-wrap"><div class="spinner"></div><div style="font-size:12px;color:var(--txm)">불러오는 중...</div></div>
      </div>
    </div>
  </div>

  <div id="pg-shop" style="display:none">
    <div class="main">
      <div class="sync-row"><span class="sync-dot" id="syncDot"></span><span id="syncTxt"></span></div>
      <div class="banner">
        <div><div class="bn" id="sh-nm">-</div><div class="bns">내 포인트</div></div>
        <div class="pb"><span class="star">★</span><span id="sh-pts">0</span> P</div>
      </div>
      <div class="st"><span class="dot"></span>과자 선택하기</div>
      <div class="sg" id="snackGrid"></div>
      <div class="st"><span class="dot"></span>장바구니</div>
      <div class="cb">
        <div id="cartItems"><div class="ce">과자를 선택해보세요!</div></div>
        <div class="ct" id="cartTot" style="display:none">
          <span class="ct-l">합계</span><span class="ct-p" id="ctPts">0 P</span>
        </div>
      </div>
      <button class="bo" id="orderBtn" onclick="placeOrder()" disabled>주문하기</button>
      <div class="lr"><button class="lb" onclick="logout()">← 나가기</button></div>
    </div>
  </div>

  <div id="pg-att" style="display:none">
    <div class="main">
      <div class="ad">
        <div><div class="apl">오늘 날짜</div><div class="ad-v" id="todayDate">-</div></div>
        <div class="aps">
          <span class="apl">출석 포인트</span>
          <input class="api" type="number" id="attPts" value="10" min="1">
          <span class="apl">P</span>
        </div>
      </div>
      <div class="as" id="attSum"><span>출석 0명</span><span>총 적립 0 P</span></div>
      <div class="al" id="attList"></div>
      <button class="bas" id="attBtn" onclick="submitAtt()">✓ 출석 저장 및 포인트 적립</button>
      <div class="st" style="margin-top:14px"><span class="dot"></span>최근 출석 기록</div>
      <div id="attLog"><div class="ce">출석 기록이 없습니다</div></div>
    </div>
  </div>

  <div id="pg-adm" style="display:none">
    <div class="main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="sync-row" style="margin-bottom:0"><span class="sync-dot" id="syncDot2"></span><span id="syncTxt2"></span></div>
        <button class="bs bl" onclick="loadData(true)">🔄 새로고침</button>
      </div>
      <div class="adc">
        <div class="st"><span class="dot"></span>학생 포인트 관리</div>
        <div class="adsb">학생 선택 후 포인트 직접 추가</div>
        <div class="adr">
          <select id="admSel" class="adi" style="flex:1.4"><option value="">학생 선택</option></select>
          <input type="number" id="admPts" class="adi" placeholder="포인트" style="width:70px;flex:none">
          <button class="bs" onclick="addPts()">추가</button>
        </div>
        <table class="tbl"><thead><tr><th>이름</th><th>포인트</th><th>빠른조정</th></tr></thead><tbody id="stTb"></tbody></table>
      </div>
      <div class="adc">
        <div class="st"><span class="dot"></span>과자 재고 관리</div>
        <div class="adsb">수정 후 각 행의 저장 버튼을 눌러주세요</div>
        <table class="tbl"><thead><tr><th>과자</th><th>포인트</th><th>재고</th><th></th></tr></thead><tbody id="snTb"></tbody></table>
      </div>
      <div class="adc">
        <div class="st"><span class="dot"></span>주문 내역</div>
        <div id="ordList"><div class="ce">주문 없음</div></div>
      </div>
      <div class="adc">
        <div class="st"><span class="dot"></span>학생 추가</div>
        <div class="adr">
          <input type="text" id="newNm" class="adi" placeholder="새 학생 이름">
          <button class="bs gn" onclick="addStu()">추가</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-zdZ1SJyCC2TE070nHUgW18ZwwfgtgWmYEScZm9S0Gi2WtEoWOS4yfQm4Orr_Yu-O/exec";

const D = {
  students: [],
  snacks: SNACKS_DATA.map(s => ({...s})),
  orders: [],
  attLogs: [],
  attChk: {},
  user: null,
  cart: [],
  mode: 's',
};

// ── API ───────────────────────────────────────────────────────
function api(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const qs = Object.entries(params).map(([k,v]) =>
      k + '=' + encodeURIComponent(typeof v === 'object' ? JSON.stringify(v) : v)
    ).join('&');
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      reject(new Error('요청 시간 초과'));
    }, 15000);
    window[cbName] = function(data) {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      if (data.error) reject(new Error(data.error));
      else resolve(data);
    };
    script.src = SCRIPT_URL + '?' + qs + '&callback=' + cbName;
    script.onerror = () => { clearTimeout(timer); delete window[cbName]; script.remove(); reject(new Error('네트워크 오류')); };
    document.head.appendChild(script);
  });
}

function sync(state, msg, id2=false) {
  const ids = id2 ? ['syncDot2','syncTxt2'] : ['syncDot','syncTxt'];
  ids.forEach((id,i) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (i===0) { el.className = 'sync-dot ' + state; }
    else { el.textContent = msg; }
  });
}

// ── 데이터 로드 ───────────────────────────────────────────────
async function loadData(isAdmin=false) {
  sync('spin', '연결 중...', isAdmin);
  try {
    const data = await api({ action: 'getData' });
    D.students = (data.students||[]).map(s => ({
      id: s['id'], name: s['이름'], points: Number(s['포인트'])
    }));
    D.snacks = (data.snacks||[]).map(s => {
      const base = SNACKS_DATA.find(x => x.name === s['이름']) || {};
      return { id: s['id'], name: s['이름'], points: Number(s['포인트']), stock: Number(s['재고']), img: base.img || '' };
    });
    D.orders = (data.orders||[]).map(o => ({
      id: o['주문id'], student: o['학생이름'], itemStr: o['과자목록'],
      total: Number(o['총포인트']), time: o['시간'], status: o['상태']
    }));
    // 출석 기록 그룹핑
    const rawLogs = (data.attLogs||[]);
    const grouped = {};
    rawLogs.forEach(l => {
      const key = l['날짜'] + '|' + l['시간'];
      if (!grouped[key]) grouped[key] = { date:l['날짜'], time:l['시간'], names:[], pts:Number(l['적립포인트']) };
      grouped[key].names.push(l['학생이름']);
    });
    D.attLogs = Object.values(grouped).slice(0, 20);

    sync('ok', '동기화 완료', isAdmin);
    renderChips();
    if (D.mode === 'a') renderAtt();
    if (D.mode === 'm') renderAdm();
    if (D.user) {
      const updated = D.students.find(s => s.id === D.user.id);
      if (updated) { D.user = updated; renderShop(); }
    }
  } catch(e) {
    sync('err', '연결 실패', isAdmin);
    document.getElementById('chipGrid').innerHTML =
      `<div class="err-box">⚠️ 서버 연결 실패<br><small>${e.message}</small><br><button class="bs" onclick="loadData()" style="margin-top:8px">다시 시도</button></div>`;
  }
}

// ── 모드 ──────────────────────────────────────────────────────
function setMode(m) {
  D.mode = m;
  ['s','a','m'].forEach(x => document.getElementById('tb-'+x).classList.toggle('on', x===m));
  if (m==='s') { logout(); }
  else if (m==='a') { showPg('att'); renderAtt(); }
  else { showPg('adm'); renderAdm(); }
}

function showPg(p) {
  ['login','shop','att','adm'].forEach(x => {
    document.getElementById('pg-'+x).style.display = x===p ? (p==='login'?'flex':'block') : 'none';
  });
}

// ── 학생 로그인 ───────────────────────────────────────────────
function renderChips() {
  const el = document.getElementById('chipGrid');
  if (!D.students.length) { el.innerHTML = '<div class="ce">학생 데이터가 없습니다</div>'; return; }
  el.innerHTML = D.students.map(s =>
    `<button class="chip" onclick="loginAs(${s.id})">${s.name}</button>`
  ).join('');
}

function loginAs(id) {
  D.user = D.students.find(s => s.id === id);
  D.cart = [];
  showPg('shop');
  renderShop();
}

function logout() { D.user = null; D.cart = []; showPg('login'); renderChips(); }

// ── 쇼핑 ─────────────────────────────────────────────────────
function renderShop() {
  const u = D.user;
  document.getElementById('sh-nm').textContent = u.name + ' 학생';
  document.getElementById('sh-pts').textContent = u.points;
  document.getElementById('snackGrid').innerHTML = D.snacks.map(s => {
    const oos = s.stock === 0;
    const inC = D.cart.filter(c => c.id === s.id).length;
    return `<div class="sc ${oos?'oos':''}" onclick="${oos?'':'addCart('+s.id+')'}">
      ${oos?'<span class="ob">품절</span>':''}
      <div class="si"><img src="${s.img}" alt="${s.name}" onerror="this.parentNode.innerHTML='🍬'"></div>
      <div class="sn">${s.name}</div>
      <div class="sp">★${s.points}P</div>
      <div class="ss">재고${s.stock}${inC?' ('+inC+')':''}</div>
    </div>`;
  }).join('');
  renderCart();
}

function addCart(id) {
  const s = D.snacks.find(s => s.id === id);
  if (!s || s.stock === 0) return;
  if (D.cart.filter(c=>c.id===id).length >= s.stock) { toast('재고가 부족해요!'); return; }
  if (D.cart.reduce((a,c)=>a+c.points,0)+s.points > D.user.points) { toast('포인트가 부족해요!'); return; }
  D.cart.push({id:s.id, name:s.name, points:s.points, img:s.img});
  renderShop(); toast('장바구니에 담았어요!');
}

function renderCart() {
  const el = document.getElementById('cartItems');
  const tot = D.cart.reduce((a,c)=>a+c.points,0);
  if (!D.cart.length) {
    el.innerHTML = '<div class="ce">과자를 선택해보세요!</div>';
    document.getElementById('cartTot').style.display = 'none';
    document.getElementById('orderBtn').disabled = true; return;
  }
  const g = {};
  D.cart.forEach(c => { if(!g[c.id]) g[c.id]={...c,qty:0}; g[c.id].qty++; });
  el.innerHTML = Object.values(g).map(c =>
    `<div class="ci">
      <span class="ci-n"><img src="${c.img}" style="width:18px;height:18px;border-radius:3px;object-fit:cover;vertical-align:middle;margin-right:4px" onerror="this.style.display='none'">${c.name} x${c.qty}</span>
      <span style="display:flex;align-items:center;gap:5px">
        <span class="ci-p">★${c.points*c.qty}P</span>
        <button class="cr" onclick="removeCart(${c.id})">✕</button>
      </span>
    </div>`
  ).join('');
  document.getElementById('cartTot').style.display = 'flex';
  document.getElementById('ctPts').textContent = tot + ' P';
  document.getElementById('orderBtn').disabled = false;
}

function removeCart(id) {
  const idx = D.cart.map(c=>c.id).lastIndexOf(id);
  if (idx!==-1) D.cart.splice(idx,1);
  renderShop();
}

async function placeOrder() {
  if (!D.cart.length) return;
  const g = {};
  D.cart.forEach(c => { if(!g[c.id]) g[c.id]={...c,qty:0}; g[c.id].qty++; });
  const items = Object.values(g);
  const total = D.cart.reduce((a,c)=>a+c.points,0);
  const btn = document.getElementById('orderBtn');
  btn.disabled = true; btn.textContent = '처리 중...';
  sync('spin','주문 처리 중...');
  try {
    const res = await api({
      action:'order', student:D.user.name,
      items: items.map(i=>({id:i.id,name:i.name,qty:i.qty,points:i.points})),
      total
    });
    D.user.points = res.newPoints;
    const st = D.students.find(s=>s.id===D.user.id);
    if (st) st.points = res.newPoints;
    items.forEach(it => { const s=D.snacks.find(s=>s.id===it.id); if(s) s.stock-=it.qty; });
    D.cart = [];
    sync('ok','주문 완료');
    renderShop(); toast('주문 완료! 선생님께 받으세요 🎉');
  } catch(e) {
    sync('err','주문 실패');
    toast('주문 실패: ' + e.message);
    btn.disabled = false; btn.textContent = '주문하기';
  }
}

// ── 출석 ─────────────────────────────────────────────────────
function renderAtt() {
  const now = new Date();
  document.getElementById('todayDate').textContent =
    now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 '+
    ['일','월','화','수','목','금','토'][now.getDay()]+'요일';
  const pts = parseInt(document.getElementById('attPts').value)||10;
  const ckd = Object.keys(D.attChk).filter(k=>D.attChk[k]).length;
  document.getElementById('attSum').innerHTML = `<span>출석 ${ckd}명</span><span>총 적립 ${ckd*pts} P</span>`;
  document.getElementById('attList').innerHTML = D.students.map(s => {
    const on = D.attChk[s.id];
    return `<div class="ai ${on?'ck':''}">
      <div><div class="an">${s.name}</div>
      ${on?`<div class="ae">+${pts}P 적립 예정</div>`:'<div style="font-size:10px;color:var(--txm)">미출석</div>'}</div>
      <button class="acb ${on?'on':''}" onclick="togAtt(${s.id})">${on?'✓':''}</button>
    </div>`;
  }).join('');
  renderAttLog();
}

function togAtt(id) { D.attChk[id] = !D.attChk[id]; renderAtt(); }

async function submitAtt() {
  const pts = parseInt(document.getElementById('attPts').value)||10;
  const ckd = D.students.filter(s=>D.attChk[s.id]);
  if (!ckd.length) { toast('출석한 학생을 선택하세요'); return; }
  const btn = document.getElementById('attBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    const res = await api({ action:'attend', names:ckd.map(s=>s.name), pts });
    res.updated.forEach(u => {
      const st = D.students.find(s=>s.name===u.name);
      if (st) st.points = u.points;
    });
    D.attChk = {};
    toast(`${ckd.length}명 각 ${pts}P 적립 완료! 🎉`);
    await loadData();
  } catch(e) {
    toast('출석 저장 실패: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '✓ 출석 저장 및 포인트 적립';
}

function renderAttLog() {
  const el = document.getElementById('attLog');
  if (!D.attLogs.length) { el.innerHTML = '<div class="ce">출석 기록이 없습니다</div>'; return; }
  el.innerHTML = D.attLogs.slice(0,8).map(g =>
    `<div class="ali"><b>${g.date} ${g.time}</b> | ${g.names.join(', ')} <span style="color:var(--accd);font-weight:700">각 +${g.pts}P</span></div>`
  ).join('');
}

// ── 관리자 ───────────────────────────────────────────────────
function renderAdm() {
  const sel = document.getElementById('admSel');
  sel.innerHTML = '<option value="">학생 선택</option>' +
    D.students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('stTb').innerHTML = D.students.map(s =>
    `<tr><td>${s.name}</td><td><b>★${s.points}</b></td><td>
      <button class="bs gr" onclick="adjP('${s.name}',-10)" style="padding:2px 6px">-10</button>
      <button class="bs" onclick="adjP('${s.name}',10)" style="padding:2px 6px;margin-left:2px">+10</button>
    </td></tr>`
  ).join('');
  document.getElementById('snTb').innerHTML = D.snacks.map(s =>
    `<tr>
      <td><img src="${s.img}" style="width:20px;height:20px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-right:4px" onerror="this.style.display='none'">${s.name}</td>
      <td><input id="pt_${s.id}" type="number" value="${s.points}" min="1" style="width:46px;border:1px solid #eee;border-radius:5px;padding:2px 4px;font-size:11px"></td>
      <td><input id="st_${s.id}" type="number" value="${s.stock}" min="0" style="width:42px;border:1px solid #eee;border-radius:5px;padding:2px 4px;font-size:11px"></td>
      <td><button class="bs gn" onclick="saveSnack(${s.id})" style="padding:3px 7px">저장</button></td>
    </tr>`
  ).join('');
  const ol = document.getElementById('ordList');
  if (!D.orders.length) { ol.innerHTML = '<div class="ce">주문 없음</div>'; return; }
  ol.innerHTML = D.orders.map(o =>
    `<div class="oi">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span class="on_">${o.student}</span>
        <button class="os ${o.status==='전달완료'?'sd':'sp_'}" onclick="togOrd(${o.id},'${o.status}')">
          ${o.status==='전달완료'?'✓ 전달완료':'대기중 (탭)'}
        </button>
      </div>
      <div class="om">${o.itemStr} | ★${o.total}P | ${o.time}</div>
    </div>`
  ).join('');
}

async function addPts() {
  const id = +document.getElementById('admSel').value;
  const pts = +document.getElementById('admPts').value;
  if (!id||!pts||pts<=0) { toast('학생과 포인트를 입력하세요'); return; }
  const s = D.students.find(s=>s.id===id);
  if (!s) return;
  sync('spin','처리 중...',true);
  try {
    const res = await api({ action:'updatePoints', name:s.name, delta:pts });
    s.points = res.newPoints;
    sync('ok','저장됨',true);
    toast(s.name+'에게 '+pts+'P 추가!');
    document.getElementById('admPts').value = '';
    renderAdm();
  } catch(e) { sync('err','실패',true); toast('실패: '+e.message); }
}

async function adjP(name, delta) {
  const s = D.students.find(s=>s.name===name);
  if (!s) return;
  sync('spin','처리 중...',true);
  try {
    const res = await api({ action:'updatePoints', name, delta });
    s.points = res.newPoints;
    sync('ok','저장됨',true);
    renderAdm();
  } catch(e) { sync('err','실패',true); toast('실패: '+e.message); }
}

async function saveSnack(id) {
  const pts = parseInt(document.getElementById('pt_'+id).value);
  const stock = parseInt(document.getElementById('st_'+id).value);
  sync('spin','저장 중...',true);
  try {
    await api({ action:'updateSnack', id, points:pts, stock });
    const s = D.snacks.find(s=>s.id===id);
    if (s) { s.points=pts; s.stock=stock; }
    sync('ok','저장됨',true);
    toast('재고 저장 완료!');
  } catch(e) { sync('err','실패',true); toast('실패: '+e.message); }
}

async function togOrd(ordId, curStatus) {
  const newStatus = curStatus==='전달완료'?'대기중':'전달완료';
  sync('spin','처리 중...',true);
  try {
    await api({ action:'updateOrderStatus', orderId:ordId, status:newStatus });
    const o = D.orders.find(o=>o.id===ordId);
    if (o) o.status = newStatus;
    sync('ok','저장됨',true);
    renderAdm();
  } catch(e) { sync('err','실패',true); toast('실패: '+e.message); }
}

async function addStu() {
  const nm = document.getElementById('newNm').value.trim();
  if (!nm) { toast('이름을 입력하세요'); return; }
  sync('spin','처리 중...',true);
  try {
    const res = await api({ action:'addStudent', name:nm });
    D.students.push({ id:res.id, name:nm, points:0 });
    document.getElementById('newNm').value = '';
    sync('ok','저장됨',true);
    toast(nm+' 학생 추가!');
    renderAdm(); renderChips();
  } catch(e) { sync('err','실패',true); toast('실패: '+e.message); }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

document.getElementById('attPts').addEventListener('input', ()=>{ if(D.mode==='a') renderAtt(); });

// 초기화
loadData();
</script>
</body>
</html>
